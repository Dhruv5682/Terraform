trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'envs/dev/**'
      - 'modules/**'
    exclude:
      - '*.md'
      - '.gitignore'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: infra-vars
  - name: terraformVersion
    value: '1.9.0'
  - name: workingDirectory
    value: 'envs/dev'
  - name: TF_VAR_rgname
    value: 'rg-webapp-dev-sea'
  - name: TF_VAR_vnet_name
    value: 'vnet-webapp-dev-sea'

stages:
  - stage: Validate
    displayName: 'Terraform Validate'
    jobs:
      - job: Validate
        displayName: 'Format Check & Validate'
        steps:
          - checkout: self

          - template: templates/terraform-setup.yml
            parameters:
              terraformVersion: $(terraformVersion)
              runInit: false

          - script: terraform fmt -check -recursive
            displayName: 'Check formatting (all files)'
            workingDirectory: '$(System.DefaultWorkingDirectory)'

          - script: terraform init -backend=false
            displayName: 'Init (validation only)'
            workingDirectory: '$(workingDirectory)'

          - script: terraform validate
            displayName: 'Validate configuration'
            workingDirectory: '$(workingDirectory)'

  - stage: Plan
    displayName: 'Terraform Plan'
    dependsOn: Validate
    jobs:
      - job: Plan
        displayName: 'Generate execution plan'
        steps:
          - checkout: self

          - template: templates/terraform-setup.yml
            parameters:
              terraformVersion: $(terraformVersion)
              workingDirectory: $(workingDirectory)

          - template: templates/terraform-run.yml
            parameters:
              command: |
                terraform plan -out=tfplan -input=false
                terraform show tfplan
              displayName: 'Terraform Plan & Show'
              workingDirectory: $(workingDirectory)
              includeDbPassword: true

          - publish: '$(workingDirectory)/tfplan'
            artifact: terraform-plan
            displayName: 'Publish plan artifact'

  - stage: Apply
    displayName: 'Terraform Apply'
    dependsOn: Plan
    jobs:
      - deployment: Apply
        displayName: 'Apply infrastructure changes'
        environment: 'infra-dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/terraform-setup.yml
                  parameters:
                    terraformVersion: $(terraformVersion)
                    workingDirectory: $(workingDirectory)

                - download: current
                  artifact: terraform-plan
                  displayName: 'Download plan artifact'

                - template: templates/terraform-run.yml
                  parameters:
                    command: |
                      cp $(Pipeline.Workspace)/terraform-plan/tfplan ./tfplan
                      terraform apply -auto-approve -input=false tfplan
                    displayName: 'Terraform Apply'
                    workingDirectory: $(workingDirectory)
                    includeDbPassword: true

  - stage: Destroy
    displayName: 'Terraform Destroy'
    dependsOn: Apply
    condition: eq(variables['Build.Reason'], 'Manual')
    jobs:
      - deployment: Destroy
        displayName: 'Destroy infrastructure'
        environment: 'infra-dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/terraform-setup.yml
                  parameters:
                    terraformVersion: $(terraformVersion)
                    workingDirectory: $(workingDirectory)

                - template: templates/terraform-run.yml
                  parameters:
                    command: terraform destroy -auto-approve -input=false
                    displayName: 'Terraform Destroy'
                    workingDirectory: $(workingDirectory)
                    includeDbPassword: true
